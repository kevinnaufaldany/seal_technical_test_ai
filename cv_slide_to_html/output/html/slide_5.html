<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>Clean Slide HTML</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #111827;
      font-family: Arial, sans-serif;
    }

    .toolbar {
      max-width: 5734px;
      margin: 0 auto 16px auto;
      color: white;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .toolbar-title {
      font-size: 16px;
      font-weight: 700;
    }

    .toolbar-note {
      font-size: 13px;
      color: #d1d5db;
    }

    .slide-wrapper {
      width: 100%;
      overflow: auto;
    }

    .slide {
      position: relative;
      width: 5734px;
      height: 3200px;
      margin: 0 auto;
      
        background-image: url("../../output/backgrounds/slide_5_bg_clean.png");
        background-size: 100% 100%;
        background-repeat: no-repeat;
        background-position: center;
        
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      border-radius: 8px;
      overflow: hidden;
    }

    .text-layer {
      position: absolute;
      display: inline-block;
      white-space: pre-line;
      outline: none;
      z-index: 2;
      background: transparent;
    }

    .text-layer:hover {
      outline: 2px dashed rgba(255, 0, 0, 0.60);
      cursor: text;
    }

    .text-layer:focus {
      outline: 3px solid rgba(59, 130, 246, 0.9);
      background-color: rgba(255, 255, 255, 0.25);
      color: inherit;
    }

    @media (max-width: 5734px) {
      .slide {
        transform: scale(calc((100vw - 48px) / 5734));
        transform-origin: top left;
        margin: 0;
      }

      .slide-wrapper {
        height: calc(3200px * ((100vw - 48px) / 5734));
      }
    }
  </style>
</head>
